<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>質問管理システム v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#3D78F2;--blue-l:#E8F0FF;--purple:#7C3AED;--green:#059669;--green-l:#ECFDF5;--orange:#D97706;--red:#DC2626;--red-l:#FEE2E2;--bg:#F7F8FA;--w:#fff;--t:#1a1a1a;--s:#6B7280;--b:#E5E7EB;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;font-size:14px}
.app{max-width:1280px;margin:0 auto;padding:16px 20px}
/* Header */
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hd h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.hd h1 em{font-style:normal;background:var(--blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px}
.hd-acts{display:flex;gap:6px;flex-wrap:wrap}
/* Buttons */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:active{transform:scale(.97)}
.bp{background:var(--blue);color:#fff}.bp:hover{background:#2D5FD6}
.bg{background:var(--green);color:#fff}
.br{background:var(--red);color:#fff}
.bo{background:var(--w);color:var(--t);border:1px solid var(--b)}.bo:hover{background:#F3F4F6}
.bs{padding:5px 9px;font-size:11px}
/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid var(--b);overflow-x:auto}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--s);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;white-space:nowrap}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--blue)}
/* Stats */
.sts{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.st{background:var(--w);border-radius:var(--r);padding:12px 16px;box-shadow:var(--sh);min-width:100px}
.st .n{font-size:22px;font-weight:700;color:var(--blue)}.st .l{font-size:10px;color:var(--s)}
/* Filters */
.flt{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fi{padding:7px 10px;border:1px solid var(--b);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:var(--w)}
.fi:focus{border-color:var(--blue)}
select.fi{min-width:100px}
.fi-search{min-width:200px}
/* Table */
.tw{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#F9FAFB;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--s);border-bottom:1px solid var(--b);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--blue)}
td{padding:8px 10px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tr:hover{background:#FAFBFF}
.qt{max-width:300px;line-height:1.5}
.bd{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600}
.bd-c{background:var(--blue-l);color:var(--blue)}
.bd-x{background:var(--green-l);color:var(--green)}
.bd-on{background:var(--green-l);color:var(--green)}
.bd-off{background:var(--red-l);color:var(--red)}
.bd-draft{background:#FEF3C7;color:#92400E}
.bd-pub{background:var(--green-l);color:var(--green)}
.bd-sc{background:#F3E8FF;color:var(--purple)}
.acts{display:flex;gap:3px;white-space:nowrap}
/* Checkbox in table */
.cb{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
/* Pagination */
.pg{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--s)}
.pgb{display:flex;gap:3px}
.pgn{width:28px;height:28px;border-radius:6px;border:1px solid var(--b);background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.pgn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.md{background:var(--w);border-radius:16px;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.md h2{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--s);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--b);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.fg textarea{height:70px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* Tab panels */
.tp{display:none}.tp.on{display:block}
/* Bulk bar */
.bulk{background:var(--blue-l);border-radius:var(--r);padding:10px 16px;margin-bottom:12px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
.bulk.show{display:flex}
.bulk span{font-size:12px;font-weight:600;color:var(--blue)}
/* Preview panel */
.pv{background:var(--w);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.pv h2{font-size:15px;font-weight:700;margin-bottom:14px}
.pv-form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.pv-result{background:#F9FAFB;border-radius:8px;padding:14px;max-height:500px;overflow-y:auto}
.pv-q{padding:8px 10px;border-bottom:1px solid #eee;font-size:12px;display:flex;align-items:center;gap:8px}
.pv-q:last-child{border-bottom:none}
.pv-scope{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;white-space:nowrap}
.pv-common{background:#DBEAFE;color:#1D4ED8}
.pv-relationship{background:#FCE7F3;color:#BE185D}
.pv-environment{background:#FEF3C7;color:#92400E}
/* Analytics */
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.an-card{background:var(--w);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.an-card h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{width:90px;font-size:11px;text-align:right;color:var(--s)}
.bar-track{flex:1;background:#F3F4F6;border-radius:3px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:.3s;min-width:2px}
.bar-val{width:35px;font-size:11px;font-weight:700;text-align:right}
/* Result type cards */
.rt-card{background:var(--w);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;border-left:4px solid}
.rt-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
.rt-card .rt-desc{font-size:12px;color:var(--s);line-height:1.6;margin-bottom:8px}
.rt-tips{list-style:none}
.rt-tips li{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px}
.rt-tips li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
.rt-str{display:flex;gap:6px;margin-top:8px}
.rt-str span{background:var(--blue-l);color:var(--blue);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
@media(max-width:768px){.pv-form,.fr,.fr3,.an-grid{grid-template-columns:1fr}.flt{flex-direction:column}.fi{width:100%}}
</style>
</head>
<body>
<div class="app">
<div class="hd">
  <h1>📋 質問管理システム <em>v2.0</em></h1>
  <div class="hd-acts">
    <button class="btn bo" onclick="exportCSV()">📥 CSV出力</button>
    <button class="btn bo" onclick="$('csvIn').click()">📤 CSV入力</button>
    <input type="file" id="csvIn" accept=".csv" style="display:none" onchange="importCSV(event)">
    <button class="btn bo" onclick="exportJSON()">💾 JSON保存</button>
    <button class="btn bo" onclick="$('jsonIn').click()">📂 JSON読込</button>
    <input type="file" id="jsonIn" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('list',this)">📋 質問一覧</button>
  <button class="tab" onclick="sw('preview',this)">👁 出題プレビュー</button>
  <button class="tab" onclick="sw('results',this)">🎯 結果タイプ</button>
  <button class="tab" onclick="sw('analytics',this)">📊 分析</button>
  <button class="tab" onclick="sw('categories',this)">🏷 カテゴリ</button>
</div>

<!-- ===== LIST ===== -->
<div class="tp on" id="p-list">
<div class="sts" id="stsBar"></div>
<div class="bulk" id="bulkBar">
  <span id="bulkCount">0件選択中</span>
  <button class="btn bo bs" onclick="bulkStatus('published')">公開にする</button>
  <button class="btn bo bs" onclick="bulkStatus('draft')">下書きにする</button>
  <button class="btn bo bs" onclick="bulkEnable(true)">有効にする</button>
  <button class="btn bo bs" onclick="bulkEnable(false)">無効にする</button>
  <select class="fi" id="bulkCat" style="font-size:11px;padding:4px 8px">
    <option value="">カテゴリ変更...</option>
  </select>
  <button class="btn bo bs" onclick="applyBulkCat()">適用</button>
  <button class="btn br bs" onclick="bulkDelete()">一括削除</button>
  <button class="btn bo bs" onclick="clearSelection()">選択解除</button>
</div>
<div class="flt">
  <input class="fi fi-search" type="search" placeholder="🔍 質問を検索..." id="sI" oninput="render()">
  <select class="fi" id="fCat" onchange="render()"><option value="">全カテゴリ</option></select>
  <select class="fi" id="fCtx" onchange="render()">
    <option value="">全対象</option><option value="all">共通</option><option value="work">職場</option>
    <option value="family">家族</option><option value="school">学校</option><option value="friend">友人</option>
    <option value="service">ｻｰﾋﾞｽ</option><option value="shared">共同</option>
  </select>
  <select class="fi" id="fScope" onchange="render()">
    <option value="">全スコープ</option><option value="common">共通</option>
    <option value="relationship">関係</option><option value="environment">環境</option>
  </select>
  <select class="fi" id="fStat" onchange="render()">
    <option value="">全ステータス</option><option value="published">公開</option><option value="draft">下書き</option>
  </select>
  <select class="fi" id="fEn" onchange="render()">
    <option value="">全状態</option><option value="true">有効</option><option value="false">無効</option>
  </select>
  <button class="btn bp" onclick="openModal()">＋ 追加</button>
</div>
<div class="tw">
<table>
<thead><tr>
  <th style="width:30px"><input type="checkbox" class="cb" id="selAll" onchange="toggleAll(this.checked)"></th>
  <th onclick="srt('id')" style="width:55px">ID</th>
  <th onclick="srt('question')">質問文</th>
  <th onclick="srt('category')" style="width:90px">カテゴリ</th>
  <th onclick="srt('scope')" style="width:60px">スコープ</th>
  <th onclick="srt('context_group')" style="width:55px">対象</th>
  <th onclick="srt('weight')" style="width:40px">重み</th>
  <th onclick="srt('status')" style="width:55px">公開</th>
  <th onclick="srt('enabled')" style="width:45px">有効</th>
  <th style="width:120px">操作</th>
</tr></thead>
<tbody id="tBody"></tbody>
</table>
</div>
<div class="pg" id="pgn"></div>
</div>

<!-- ===== PREVIEW ===== -->
<div class="tp" id="p-preview">
<div class="pv">
  <h2>👁 出題シミュレーション</h2>
  <p style="font-size:12px;color:var(--s);margin-bottom:14px">条件を選ぶと、実際に出題される質問セット（20〜35問）をプレビューできます。構成：共通40% + 関係30% + 環境30%</p>
  <div class="pv-form">
    <div class="fg"><label>コンテキスト</label>
      <select class="fi" id="pvCtx" onchange="updatePvRelations()" style="width:100%">
        <option value="work">職場</option><option value="family">家族</option><option value="school">学校</option>
        <option value="friend">友人</option><option value="service">ｻｰﾋﾞｽ</option><option value="shared">共同生活</option>
      </select>
    </div>
    <div class="fg"><label>私の立場</label>
      <select class="fi" id="pvMy" style="width:100%"><option value="上司">上司</option><option value="部下">部下</option><option value="同僚">同僚</option><option value="先生">先生</option><option value="親">親</option></select>
    </div>
    <div class="fg"><label>相手</label>
      <select class="fi" id="pvTgt" style="width:100%"><option value="部下">部下</option><option value="上司">上司</option><option value="同僚">同僚</option><option value="子ども">子ども</option></select>
    </div>
    <div class="fg"><label>環境</label>
      <select class="fi" id="pvEnv" style="width:100%"><option value="飲食">飲食店</option><option value="接客">接客</option><option value="オフィス">オフィス</option><option value="工場">工場</option><option value="学校">学校</option><option value="家庭">家庭</option></select>
    </div>
  </div>
  <button class="btn bp" onclick="runPreview()">出題セットを生成</button>
  <button class="btn bo" onclick="runPreview()" style="margin-left:6px">🔄 再生成</button>
  <div class="pv-result" id="pvResult" style="margin-top:14px">
    <p style="text-align:center;color:var(--s);padding:30px 0">条件を選んで「出題セットを生成」を押してください</p>
  </div>
</div>
</div>

<!-- ===== RESULTS ===== -->
<div class="tp" id="p-results">
<h2 style="font-size:16px;font-weight:700;margin-bottom:16px">🎯 結果タイプ一覧（5タイプ）</h2>
<p style="font-size:12px;color:var(--s);margin-bottom:16px">チェック結果で表示される傾向タイプです。病名・診断・確率は一切表示しません。</p>
<div id="rtCards"></div>
</div>

<!-- ===== ANALYTICS ===== -->
<div class="tp" id="p-analytics">
<div class="sts" style="margin-bottom:16px">
  <div class="st"><div class="n" id="anTotal">0</div><div class="l">総回答セッション</div></div>
  <div class="st"><div class="n" id="anComplete">0%</div><div class="l">完了率</div></div>
  <div class="st"><div class="n" id="anDrop">0%</div><div class="l">離脱率</div></div>
  <div class="st"><div class="n" id="anAvgQ">0</div><div class="l">平均回答数</div></div>
</div>
<div class="an-grid" id="anGrid"></div>
</div>

<!-- ===== CATEGORIES ===== -->
<div class="tp" id="p-categories">
<div class="pv">
  <h2>🏷 カテゴリ管理</h2>
  <p style="font-size:12px;color:var(--s);margin-bottom:14px">カテゴリの一覧と各カテゴリの質問数を確認・編集できます。</p>
  <div id="catList"></div>
  <div style="margin-top:14px;display:flex;gap:8px">
    <input class="fi" id="newCat" placeholder="新しいカテゴリ名">
    <button class="btn bp" onclick="addCategory()">追加</button>
  </div>
</div>
</div>
</div>

<!-- MODAL -->
<div class="mo" id="modal" onclick="if(event.target===this)closeModal()">
<div class="md">
  <h2 id="mTitle">質問追加</h2>
  <input type="hidden" id="eId">
  <div class="fg"><label>質問文 *</label><textarea id="fQ" placeholder="観察可能な行動を具体的に記述"></textarea></div>
  <div class="fr">
    <div class="fg"><label>カテゴリ</label><select id="fCt"></select></div>
    <div class="fg"><label>サブカテゴリ</label><input id="fSc" placeholder="例：曖昧指示"></div>
  </div>
  <div class="fr3">
    <div class="fg"><label>スコープ</label><select id="fSp"><option value="common">共通</option><option value="relationship">関係</option><option value="environment">環境</option></select></div>
    <div class="fg"><label>コンテキスト</label><select id="fCx"><option value="all">共通</option><option value="work">職場</option><option value="family">家族</option><option value="school">学校</option><option value="friend">友人</option><option value="service">ｻｰﾋﾞｽ</option><option value="shared">共同</option></select></div>
    <div class="fg"><label>環境</label><input id="fEv" value="all" placeholder="all / 飲食 / 接客"></div>
  </div>
  <div class="fr3">
    <div class="fg"><label>私の立場</label><input id="fMr" value="all"></div>
    <div class="fg"><label>相手の立場</label><input id="fTr" value="all"></div>
    <div class="fg"><label>重み (1-5)</label><input id="fWt" type="number" min="1" max="5" value="3"></div>
  </div>
  <div class="fr3">
    <div class="fg"><label>ステータス</label><select id="fSt"><option value="published">公開</option><option value="draft">下書き</option></select></div>
    <div class="fg"><label>有効/無効</label><select id="fEn"><option value="true">有効</option><option value="false">無効</option></select></div>
    <div class="fg"><label>回答選択肢</label><input id="fAo" value="よくある,少しある,ほぼない"></div>
  </div>
  <div class="fg"><label>結果マッピング（JSON）</label><textarea id="fRm" style="height:50px;font-family:monospace;font-size:11px"></textarea></div>
  <div class="ma">
    <button class="btn bo" onclick="closeModal()">キャンセル</button>
    <button class="btn bp" onclick="saveQ()">保存</button>
  </div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
let Q=[], sel=new Set(), sc='display_order', sd=1, cp=1, PS=25;
const CL={all:'共通',work:'職場',family:'家族',school:'学校',friend:'友人',service:'ｻｰﾋﾞｽ',shared:'共同'};
const SL={common:'共通',relationship:'関係',environment:'環境'};
let RESULT_TYPES=__RESULT_TYPES__;
let analytics={sessions:[],perQuestion:{}};

function init(){
  const s=localStorage.getItem('bt_q2');
  Q=s?JSON.parse(s):__QUESTIONS__;
  const a=localStorage.getItem('bt_analytics');
  if(a)analytics=JSON.parse(a);
  buildCatFilter();render();renderRT();renderAnalytics();renderCats();
}
function save(){localStorage.setItem('bt_q2',JSON.stringify(Q))}
function sw(n,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));el.classList.add('on');$('p-'+n).classList.add('on');if(n==='analytics')renderAnalytics();if(n==='categories')renderCats()}

// ===== TABLE =====
function render(){
  let f=getFiltered();
  f.sort((a,b)=>{let va=a[sc],vb=b[sc];if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();return va<vb?-1*sd:va>vb?sd:0});
  const total=f.length,tp=Math.ceil(total/PS)||1;
  if(cp>tp)cp=tp;
  const start=(cp-1)*PS,page=f.slice(start,start+PS);
  const en=Q.filter(q=>q.enabled).length,pub=Q.filter(q=>q.status==='published').length;
  $('stsBar').innerHTML=`<div class="st"><div class="n">${Q.length}</div><div class="l">全質問</div></div><div class="st"><div class="n">${pub}</div><div class="l">公開</div></div><div class="st"><div class="n">${en}</div><div class="l">有効</div></div><div class="st"><div class="n">${f.length}</div><div class="l">表示中</div></div><div class="st"><div class="n">${new Set(Q.map(q=>q.category)).size}</div><div class="l">カテゴリ</div></div>`;
  $('tBody').innerHTML=page.map(q=>`<tr>
    <td><input type="checkbox" class="cb" ${sel.has(q.id)?'checked':''} onchange="toggleSel('${q.id}',this.checked)"></td>
    <td><code style="font-size:11px">${q.id}</code></td>
    <td class="qt">${q.question}</td>
    <td><span class="bd bd-c">${q.category}</span></td>
    <td><span class="bd bd-sc">${SL[q.scope]||q.scope}</span></td>
    <td><span class="bd bd-x">${CL[q.context_group]||q.context_group}</span></td>
    <td style="text-align:center;font-size:11px">${'★'.repeat(q.weight)}</td>
    <td><span class="bd ${q.status==='published'?'bd-pub':'bd-draft'}">${q.status==='published'?'公開':'下書'}</span></td>
    <td><span class="bd ${q.enabled?'bd-on':'bd-off'}">${q.enabled?'有効':'無効'}</span></td>
    <td class="acts">
      <button class="btn bo bs" onclick="openModal('${q.id}')">✏️</button>
      <button class="btn bo bs" onclick="dupQ('${q.id}')" title="複製">📋</button>

      <button class="btn bo bs" onclick="delQ('${q.id}')">🗑</button>
    </td>
  </tr>`).join('');
  let ph=`<span>${start+1}〜${Math.min(start+PS,total)} / ${total}件</span><div class="pgb">`;
  for(let i=1;i<=tp;i++)ph+=`<button class="pgn ${i===cp?'on':''}" onclick="cp=${i};render()">${i}</button>`;
  $('pgn').innerHTML=ph+'</div>';
  updateBulk();
}
function getFiltered(){
  const s=$('sI').value.toLowerCase(),cat=$('fCat').value,ctx=$('fCtx').value,scope=$('fScope').value,stat=$('fStat').value,en=$('fEn').value;
  return Q.filter(q=>{
    if(s&&!q.question.toLowerCase().includes(s)&&!q.id.toLowerCase().includes(s)&&!(q.subcategory||'').toLowerCase().includes(s))return false;
    if(cat&&q.category!==cat)return false;
    if(ctx&&q.context_group!==ctx)return false;
    if(scope&&q.scope!==scope)return false;
    if(stat&&q.status!==stat)return false;
    if(en!==''&&String(q.enabled)!==en)return false;
    return true;
  });
}
function srt(c){if(sc===c)sd*=-1;else{sc=c;sd=1}render()}
function buildCatFilter(){
  const cats=[...new Set(Q.map(q=>q.category))].sort();

function dupQ(id){
  const o=Q.find(x=>x.id===id);if(!o)return;
  const mx=Q.reduce((m,q)=>{const n=parseInt(q.id.replace('Q',''));return n>m?n:m},0);

// ===== PREVIEW =====
function runPreview(){
  const ctx=$('pvCtx').value,my=$('pvMy').value,tgt=$('pvTgt').value,env=$('pvEnv').value;
  const pool=Q.filter(q=>q.enabled&&q.status==='published');
  // Common: scope=common OR context_group=all
  const common=pool.filter(q=>q.scope==='common');
  // Relationship: matches context
  const rel=pool.filter(q=>q.scope==='relationship'&&(q.context_group===ctx||q.context_group==='all')&&(q.my_role==='all'||q.my_role===my)&&(q.target_role==='all'||q.target_role===tgt));
  // Environment: matches env
  const env_q=pool.filter(q=>q.scope==='environment'||(q.environment!=='all'&&env.includes(q.environment)));

  const totalTarget=Math.min(28,Math.max(20,common.length));
  const nCommon=Math.round(totalTarget*0.4);
  const nRel=Math.round(totalTarget*0.3);
  const nEnv=totalTarget-nCommon-nRel;

  const pick=(arr,n)=>{const s=[...arr].sort(()=>Math.random()-.5);return s.slice(0,Math.min(n,s.length))};
  const selected=[...pick(common,nCommon),...pick(rel,nRel),...pick(env_q,nEnv)];
  // Remove duplicates
  const seen=new Set(),final=[];
  selected.forEach(q=>{if(!seen.has(q.id)){seen.add(q.id);final.push(q)}});

  $('pvResult').innerHTML=`<div style="padding:8px 0 12px;font-size:12px;color:var(--s)">
    <strong>出題数: ${final.length}問</strong>（共通 ${pick(common,nCommon).length} + 関係 ${pick(rel,nRel).length} + 環境 ${pick(env_q,nEnv).length}）
    ／ 条件: ${CL[ctx]} → ${my} → ${tgt} → ${env}
  </div>`+final.map((q,i)=>`<div class="pv-q">
    <span style="color:var(--s);min-width:20px">${i+1}.</span>
    <span class="pv-scope pv-${q.scope}">${SL[q.scope]}</span>
    <span>${q.question}</span>
    <span class="bd bd-c" style="margin-left:auto">${q.category}</span>
  </div>`).join('');
}

function importCSV(e){

  const r=new FileReader();r.onload=function(ev){
    const lines=ev.target.result.split('\n').filter(l=>l.trim());
    const h=lines[0].split(',').map(s=>s.trim().replace(/^\uFEFF/,''));
    const imp=[];
    for(let i=1;i<lines.length;i++){const v=parseCSV(lines[i]);const o={};h.forEach((k,j)=>{let val=v[j]||'';if(k==='weight'||k==='display_order')val=parseInt(val)||0;if(k==='enabled')val=val==='true'||val==='TRUE';o[k]=val});if(o.id&&o.question)imp.push(o)}
    if(imp.length&&confirm(imp.length+'件インポートしますか？')){
      const ex=new Set(Q.map(q=>q.id));let a=0,u=0;
      imp.forEach(q=>{if(!q.scope)q.scope='common';if(!q.status)q.status='published';if(!q.result_mapping)q.result_mapping={};if(!q.answer_options)q.answer_options=['よくある','少しある','ほぼない'];if(ex.has(q.id)){const i=Q.findIndex(x=>x.id===q.id);Q[i]=q;u++}else{Q.push(q);a++}});
      save();buildCatFilter();render();alert(`追加:${a} 更新:${u}`);
    }
  };r.readAsText(f);e.target.value='';
}
function parseCSV(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}

}
